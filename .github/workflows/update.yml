name: Update WC2026 ICS

on:
  schedule:
    # ── トーナメント期間中（6/11〜7/19 UTC）は毎時実行 ──
    # 試合は最長3時間。毎時チェックで「試合終了後1〜2時間以内」に更新。
    # cron は UTC 基準。試合時間帯は UTC 16:00〜06:00 が中心。
    # 全期間カバーするため毎時実行（GitHub Actions 無料枠: 2000 min/月）
    # 104試合 × 3回チェック ≒ 312回 → 余裕あり
    - cron: '0 * * * *'   # 毎時 0 分

  # 手動実行
  workflow_dispatch:

  # プッシュ時にも即実行
  push:
    branches: [main]
    paths:
      - 'generate-ics.js'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check if tournament is active
        id: check
        run: |
          # トーナメント期間（UTC）
          START="2026-06-11"
          END="2026-07-20"
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" > "$START" || "$TODAY" == "$START" ]] && [[ "$TODAY" < "$END" ]]; then
            echo "active=true" >> $GITHUB_OUTPUT
            echo "Tournament is ACTIVE — running update"
          else
            echo "active=false" >> $GITHUB_OUTPUT
            echo "Tournament not active (today=$TODAY). Skipping."
          fi

      - name: Generate ICS
        if: steps.check.outputs.active == 'true' || github.event_name != 'schedule'
        run: node generate-ics.js

      - name: Commit and push if changed
        if: steps.check.outputs.active == 'true' || github.event_name != 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wc2026-ja.ics meta.json
          # 変更があればコミット、なければスキップ（=データ未更新）
          if git diff --staged --quiet; then
            echo "No changes — openfootball data unchanged."
          else
            git commit -m "chore: update ICS [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Pushed updated ICS."
          fi
